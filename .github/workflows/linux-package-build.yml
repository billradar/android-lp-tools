name: Build Linux Packages

on:
  workflow_call:
    inputs:
      upload-tag:
        required: true
        type: string

jobs:

  deb-rpm:
    name: Build DEB/RPM ${{ matrix.package_arch }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - arch: x86_64
            package_arch: amd64
            rpm_arch: x86_64
            os: ubuntu-24.04

          - arch: arm64
            package_arch: arm64
            rpm_arch: aarch64
            os: ubuntu-24.04-arm


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: android-lp-tools-*-linux-${{ matrix.package_arch }}
          path: .
          merge-multiple: true
      - name: Extract binaries
        run: |
          for f in *.tar.gz; do
            tar -xzf "$f"
          done

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang \
            make \
            git \
            binutils \
            cmake \
            autoconf \
            automake \
            libtool \
            pkg-config \
            perl \
            python3 \
            dpkg-dev \
            rpm



      - name: Prepare binaries
        run: |
          mkdir -p bin
            find . -type f \( \
              -name lpmake -o \
              -name lpunpack -o \
              -name lpadd -o \
              -name lpdump -o \
              -name lpflash \
            \) -executable -exec cp {} bin/ \;
            chmod +x bin/*


      - name: Check binaries
        run: |
          ls -la
          ls -la bin

      - name: Build DEB
        run: |
          VERSION=${{ inputs.upload-tag }}
          VERSION=${VERSION#v}

          if ! echo "$VERSION" | grep -Eq '^[0-9]'; then
            VERSION=0.0.0
          fi
          PACKAGE_ARCH=${{ matrix.package_arch }}

          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin

          cp bin/* deb/usr/bin/

          cat > deb/DEBIAN/control <<CONTROL
          Package: android-lp-tools
          Version: ${VERSION}
          Architecture: ${PACKAGE_ARCH}
          Maintainer: billradar
          Description: Android Dynamic Partition Tools Suite
          CONTROL

          dpkg-deb \
            --build deb \
            android-lp-tools_${VERSION}_${PACKAGE_ARCH}.deb


      - name: Build RPM
        run: |
          VERSION=${{ inputs.upload-tag }}
          VERSION=${VERSION#v}

          if ! echo "$VERSION" | grep -Eq '^[0-9]'; then
            VERSION=0.0.0
          fi

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          mkdir -p rpmbuild/SOURCES/android-lp-tools/usr/bin

          cp bin/* \
            rpmbuild/SOURCES/android-lp-tools/usr/bin/


          cat > rpmbuild/SPECS/android-lp-tools.spec <<SPEC
          Name: android-lp-tools
          Version: ${VERSION}
          Release: 1
          Summary: Android Dynamic Partition Tools Suite
          License: Apache-2.0

          %description
          Android Dynamic Partition Tools Suite.

          %install
          mkdir -p %{buildroot}/usr/bin
          cp -a %{_sourcedir}/android-lp-tools/usr/bin/* %{buildroot}/usr/bin/

          %files
          /usr/bin/*
          SPEC


          rpmbuild \
            --define "_topdir $(pwd)/rpmbuild" \
            -bb rpmbuild/SPECS/android-lp-tools.spec


          cp rpmbuild/RPMS/*/*.rpm .


      - name: Upload DEB RPM
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.package_arch }}
          path: |
            *.deb
            *.rpm



  arch:
    name: Build Arch package ${{ matrix.arch }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-24.04
            container: archlinux:latest

          - arch: aarch64
            os: ubuntu-24.04-arm
            container: archlinuxarm/base:latest

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: android-lp-tools-*-linux-*
          path: .
          merge-multiple: true

      - name: Extract binaries
        run: |
          for f in *.tar.gz; do
            tar -xzf "$f"
          done

      - name: Prepare binaries
        run: |
          mkdir -p bin
          find . -type f \( \
            -name lpmake -o \
            -name lpunpack -o \
            -name lpadd -o \
            -name lpdump -o \
            -name lpflash \
          \) -executable -exec cp {} bin/ \;
          chmod +x bin/*

      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm \
            base-devel \
            git \
            clang \
            cmake \
            autoconf \
            automake \
            libtool \
            pkgconf \
            python

      - name: Check binaries
        run: |
          ls -la bin

      - name: Create builder user
        run: |
          useradd -m builder
          chown -R builder:builder .

      - name: Build Arch package
        run: |
          VERSION=${{ inputs.upload-tag }}
          VERSION=${VERSION#v}

          mkdir -p pkg/android-lp-tools/usr/bin
          cp -av bin/* pkg/android-lp-tools/usr/bin/

          cat > pkg/PKGBUILD <<-PKG
          pkgname=android-lp-tools
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Android Dynamic Partition Tools Suite"
          arch=('${{ matrix.arch }}')
          license=('Apache')

          package() {
            mkdir -p \$pkgdir/usr/bin
            cp -a usr/bin/* \$pkgdir/usr/bin/
          }
          PKG

          mkdir -p pkg/usr/bin
          cp -a bin/* pkg/usr/bin/

          chown -R builder:builder pkg
          su builder -c "cd pkg && makepkg --noconfirm"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package-${{ matrix.arch }}
          path: pkg/*.pkg.tar.zst
