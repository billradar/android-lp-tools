name: Linux Tag Build

on:
  workflow_dispatch:

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-[0-9]+'

jobs:
  run-linux-tag-build:
    uses: ./.github/workflows/package.yml
    secrets: inherit
    with:
      upload-tag: ${{ github.ref_name }}
